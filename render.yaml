services:
  - type: web
    name: asset-sentinel-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: asset-sentinel-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python -m backend.render_start
      && gunicorn --bind 0.0.0.0:$PORT --workers 1 app:app
    envVars:
      - key: ASSET_SENTINEL_DATABASE_URL
        sync: false
      - key: ASSET_SENTINEL_JWT_SECRET
        generateValue: true
      - key: ASSET_SENTINEL_AGENT_TOKEN
        sync: false
      - key: ASSET_SENTINEL_DISABLE_LOCAL_AGENT
        value: "true"
      - key: ASSET_SENTINEL_CORS_ORIGINS
        sync: false
      - key: SUPER_ADMIN_USERNAME
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
